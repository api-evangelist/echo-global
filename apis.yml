aid: echo-global
name: Echo Global Logistics
description: Tech-enabled freight brokerage with REST APIs for shipping quotes, booking LTL and FTL shipments, tracking deliveries, and managing carrier relationships. The EchoSync API suite includes the Partner-Connect API for load creation and LTL rating, the Customer API for truckload quoting, the Carrier API for digital freight marketplace access, and an Authorizer API for OAuth 2.0 token management.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/echo-global/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Freight
  - Logistics
  - Shipping
  - LTL
  - Truckload
  - Freight Brokerage
  - Transportation
  - Supply Chain
apis:
  - aid: echo-global:echosync-partner-connect-api
    name: EchoSync Partner-Connect API
    description: Formerly the Echo REST API. Provides load creation for Truckload, LTL, and Partial shipments, LTL freight rating, real-time shipment tracking, and document retrieval for existing Echo partners.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.echo.com/technology/integrations/echosync/documentation/
    baseURL: https://api.echo.com
    tags:
      - LTL
      - Truckload
      - Freight Rating
      - Shipment Tracking
      - Document Retrieval
    properties:
      - type: Documentation
        url: https://www.echo.com/technology/integrations/echosync/documentation/
      - type: OpenAPI
        url: https://app.swaggerhub.com/apis/echogl/rest-api/

  - aid: echo-global:echosync-customer-api
    name: EchoSync Customer API
    description: Provides rapid access to competitive truckload quotes and rates 24/7/365 using OAuth 2.0 Bearer token authentication.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.echo.com/technology/integrations/echosync/documentation/
    baseURL: https://api.echo.com
    tags:
      - Truckload
      - Rate Quoting
      - Freight Pricing
    properties:
      - type: Documentation
        url: https://www.echo.com/technology/integrations/echosync/documentation/
      - type: OpenAPI
        url: https://app.swaggerhub.com/apis-docs/echogl/Customer_API_OAuth_Public/

  - aid: echo-global:echosync-carrier-api
    name: EchoSync Carrier API
    description: Enables freight carriers to access Echo's Digital Freight Marketplace with real-time load visibility, offer placement, and Book It Now functionality to eliminate manual load booking.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.echo.com/technology/integrations/echosync/documentation/
    baseURL: https://api.echo.com
    tags:
      - Carrier
      - Digital Freight Marketplace
      - Load Visibility
      - Freight Booking
    properties:
      - type: Documentation
        url: https://www.echo.com/technology/integrations/echosync/documentation/
      - type: OpenAPI
        url: https://app.swaggerhub.com/apis-docs/echogl/Carrier_API_Public/

  - aid: echo-global:echosync-authorizer-api
    name: EchoSync Authorizer API
    description: Manages OAuth 2.0 Bearer token authentication for both the Carrier and Customer APIs.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.echo.com/technology/integrations/echosync/documentation/
    baseURL: https://api.echo.com
    tags:
      - Authentication
      - OAuth 2.0
      - Authorization
    properties:
      - type: Documentation
        url: https://www.echo.com/technology/integrations/echosync/documentation/
      - type: OpenAPI
        url: https://app.swaggerhub.com/apis-docs/echogl/Echo_Authorizer_Public/

